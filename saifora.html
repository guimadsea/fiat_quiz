<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    color: #1a1a1a;
  }

  .quiz-card {
    background: #fff;
    border-radius: 16px;
    border: 0.5px solid #e0dfd8;
    width: 100%;
    max-width: 600px;
    overflow: hidden;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* Intro */
  .intro-header { text-align: center; padding: 3rem 2rem 2.5rem; }
  .fiat-badge {
    display: inline-block;
    background: #f5f5f3;
    border: 0.5px solid #e0dfd8;
    border-radius: 20px;
    font-size: 11px;
    color: #888;
    padding: 4px 14px;
    margin-bottom: 1.25rem;
    letter-spacing: 0.04em;
  }
  .intro-title { font-size: 22px; font-weight: 500; line-height: 1.35; margin-bottom: 0.6rem; color: #1a1a1a; }
  .intro-sub { font-size: 15px; color: #666; line-height: 1.65; margin-bottom: 2rem; max-width: 420px; margin-left: auto; margin-right: auto; }
  .btn-start {
    height: 46px; padding: 0 28px;
    border: 0.5px solid #ccc;
    border-radius: 10px;
    background: #fff;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 0.12s;
  }
  .btn-start:hover { background: #f5f5f3; }
  .btn-start:active { transform: scale(0.98); }

  /* Progress */
  .progress-bar-wrap { padding: 1.5rem 1.5rem 1rem; border-bottom: 0.5px solid #f0f0ee; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .progress-track { height: 3px; background: #eee; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 4px; transition: width 0.4s ease; }

  /* Question */
  .question-area { padding: 1.5rem 1.5rem 0.75rem; }
  .question-label { font-size: 11px; letter-spacing: 0.07em; color: #bbb; text-transform: uppercase; margin-bottom: 0.4rem; }
  .question-text { font-size: 19px; font-weight: 500; line-height: 1.4; margin-bottom: 1.25rem; color: #1a1a1a; }

  .options-grid { display: grid; gap: 8px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 15px;
    border: 0.5px solid #e8e8e5;
    border-radius: 12px;
    background: #fff;
    cursor: pointer; text-align: left;
    transition: border-color 0.12s, background 0.12s;
    width: 100%;
    font-family: 'Inter', sans-serif;
  }
  .option-btn:hover { background: #fafaf8; border-color: #ccc; }
  .option-btn.selected { border-color: #1a1a1a; background: #fafaf8; }
  .option-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; color: #999; }
  .option-label { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.35; }
  .option-desc { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.45; }

  /* Nav */
  .nav-row { display: flex; justify-content: flex-end; padding: 1rem 1.5rem 1.5rem; }
  .btn-next {
    height: 40px; padding: 0 20px;
    border: 0.5px solid #ccc;
    border-radius: 10px;
    background: #fff;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    opacity: 0.3; pointer-events: none;
    transition: opacity 0.2s;
  }
  .btn-next.enabled { opacity: 1; pointer-events: all; }
  .btn-next.enabled:hover { background: #fafaf8; }
  .btn-next.enabled:active { transform: scale(0.98); }

  /* Result */
  .result-screen { padding-bottom: 2rem; }
  .car-hero {
    width: 100%; aspect-ratio: 16/7;
    background: #f5f5f3;
    overflow: hidden;
  }
  .car-hero img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .car-hero-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #ccc; }

  .result-body { padding: 1.5rem 1.5rem 0; }
  .result-eyebrow { font-size: 11px; letter-spacing: 0.06em; color: #bbb; text-transform: uppercase; margin-bottom: 0.4rem; }
  .result-car-name { font-size: 28px; font-weight: 500; margin-bottom: 0.3rem; color: #1a1a1a; }
  .result-tagline { font-size: 14px; color: #888; margin-bottom: 1.25rem; line-height: 1.5; }

  .result-card { background: #fafaf8; border: 0.5px solid #e8e8e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .result-card p { font-size: 14px; color: #333; line-height: 1.7; }
  .attr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 1rem; }
  .attr-chip { background: #fff; border: 0.5px solid #e8e8e5; border-radius: 8px; padding: 8px 10px; text-align: center; font-size: 12px; color: #888; }
  .attr-chip strong { display: block; font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }

  /* Wear card */
  .wear-card { border: 0.5px solid #ddd; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
  .wear-card-top { display: flex; }
  .wear-product-img { width: 100px; height: 100px; flex-shrink: 0; background: #f5f5f3; overflow: hidden; }
  .wear-product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wear-product-img-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #ccc; }
  .wear-info { flex: 1; padding: 14px 15px; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
  .wear-label { font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: #bbb; }
  .wear-product-name { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.3; }
  .wear-price-text { font-size: 13px; color: #888; }

  .wear-card-bottom {
    border-top: 0.5px solid #eee;
    padding: 12px 15px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: #fafaf8;
  }
  .wear-discount { font-size: 13px; color: #666; flex: 1; min-width: 120px; }

    background: #fff; border: 0.5px solid #ddd;
    border-radius: 6px; padding: 4px 10px;
    color: #1a1a1a; letter-spacing: 0.08em;
  }
  .btn-small {
    height: 30px; padding: 0 12px;
    border: 0.5px solid #ddd; border-radius: 8px;
    background: #fff; color: #666;
    font-family: 'Inter', sans-serif;
    font-size: 12px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    transition: background 0.1s;
  }
  .btn-small:hover { background: #f5f5f3; }
  .btn-small-primary { color: #1a1a1a; font-weight: 500; }

  .divider { height: 0.5px; background: #eee; margin: 1rem 0; }
  .btn-restart {
    height: 38px; padding: 0 18px;
    border: 0.5px solid #e8e8e5; border-radius: 10px;

  @media (max-width: 480px) {
    body { padding: 0; align-items: flex-start; }

    .progress-bar-wrap, .nav-row { padding-left: 1.25rem; padding-right: 1.25rem; }
    .attr-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>

let currentQ = 0, answers = {};
let scores = { mobi:0, argo:0, cronos:0, pulse:0, fastback:0, strada:0, toro:0, titano:0 };

function startQuiz() { showScreen("screen-quiz"); renderQuestion(0); }

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function renderQuestion(idx) {
  const q = questions[idx];
  document.getElementById("prog-label").textContent = `Pergunta ${idx+1} de ${questions.length}`;
  document.getElementById("prog-topic").textContent = q.topic;
  document.getElementById("prog-fill").style.width = `${((idx+1)/questions.length)*100}%`;
  document.getElementById("q-category").textContent = q.category;
  document.getElementById("q-text").textContent = q.text;
  const container = document.getElementById("options-container");
  container.innerHTML = "";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn" + (answers[idx] === i ? " selected" : "");
    btn.innerHTML = `<i class="ti ${opt.icon} option-icon"></i><div><div class="option-label">${opt.label}</div><div class="option-desc">${opt.desc}</div></div>`;
    btn.onclick = () => selectOption(idx, i);
    container.appendChild(btn);
  });
  updateNextBtn();
}

function selectOption(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  document.querySelectorAll(".option-btn").forEach((b,i) => b.classList.toggle("selected", i===optIdx));
  updateNextBtn();
}

function updateNextBtn() {
  const btn = document.getElementById("btn-next");
  const ok = answers[currentQ] !== undefined;
  btn.classList.toggle("enabled", ok);
  const isLast = currentQ === questions.length - 1;
  btn.innerHTML = isLast
    ? `Ver resultado <i class="ti ti-arrow-right"></i>`
    : `Próxima <i class="ti ti-arrow-right"></i>`;
}

function nextStep() {
  if (answers[currentQ] === undefined) return;
  const opt = questions[currentQ].options[answers[currentQ]];
  Object.entries(opt.scores||{}).forEach(([car,pts]) => { scores[car]=(scores[car]||0)+pts; });
  if (currentQ < questions.length-1) { currentQ++; renderQuestion(currentQ); }
  else showResult();
}

function copyCode() {
  navigator.clipboard.writeText("FIAT15WEAR").catch(()=>{});
  const btn = document.getElementById("btn-copy");
  if (btn) { btn.innerHTML=`<i class="ti ti-check"></i> Copiado`; setTimeout(()=>{ btn.innerHTML=`<i class="ti ti-copy"></i> Copiar`; },2000); }
}

function showResult() {
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const car = carData[winner];

  const wearSection = car.wearImg ? `
    <div class="wear-card">
      <div class="wear-card-top">
        <div class="wear-product-img">
          <img src="${car.wearImg}" alt="${car.wearProduct}" onerror="this.parentElement.innerHTML='<div class=\\'wear-product-img-fallback\\'><i class=\\'ti ti-shirt\\'></i></div>'" />
        </div>
        <div class="wear-info">
          <div class="wear-label">Feito pra você</div>
          <div class="wear-product-name">${car.wearProduct}</div>
          <div class="wear-price-text">${car.wearDesc}</div>
        </div>
      </div>
      <div class="wear-card-bottom">
        <span class="wear-discount">15% off com o cupom</span>
        <span class="coupon-code">FIAT15WEAR</span>
        <button class="btn-small" id="btn-copy" onclick="copyCode()"><i class="ti ti-copy"></i> Copiar</button>
        <a href="${car.wearUrl}" target="_blank" rel="noopener"><button class="btn-small btn-small-primary">Ver na loja <i class="ti ti-external-link"></i></button></a>
      </div>
    </div>` : `
    <div class="wear-card">
      <div class="wear-card-bottom" style="padding:14px 15px;">
        <span class="wear-discount">Ganhe 15% off em toda a Fiat Wear</span>
        <span class="coupon-code">FIAT15WEAR</span>
        <button class="btn-small" id="btn-copy" onclick="copyCode()"><i class="ti ti-copy"></i> Copiar</button>
        <a href="${car.wearUrl}" target="_blank" rel="noopener"><button class="btn-small btn-small-primary">Ir pra loja <i class="ti ti-external-link"></i></button></a>
      </div>
    </div>`;

  document.getElementById("result-content").innerHTML = `
    <div class="car-hero">
      <img src="${car.carImg}" alt="${car.name}" onerror="this.parentElement.innerHTML='<div class=\\'car-hero-fallback\\'><i class=\\'ti ti-car\\'></i></div>'" />
    </div>
    <div class="result-body">
      <div class="result-eyebrow">Fiat · 50 anos, fã de você</div>
      <div class="result-car-name">${car.name}</div>
      <p class="result-tagline">${car.tagline}</p>
      <div class="result-card">
        <p>${car.desc}</p>
        <div class="attr-grid">${car.attrs.map(a=>`<div class="attr-chip"><strong>${a.label}</strong>${a.value}</div>`).join("")}</div>
      </div>
      ${wearSection}
      <div class="divider"></div>
      <button class="btn-restart" onclick="restartQuiz()"><i class="ti ti-refresh"></i> Refazer o quiz</button>
    </div>`;
  showScreen("screen-result");
}

function restartQuiz() {
  currentQ=0; answers={};
  scores={mobi:0,argo:0,cronos:0,pulse:0,fastback:0,strada:0,toro:0,titano:0};
  showScreen("screen-intro");
}
</script>
</body>
</html>
